<!DOCTYPE html>
<html>

<head>
  <title>
    Expense Tracker
  </title>
  <link rel="stylesheet" href="calc.css">
  <link rel="stylesheet" href="expense.css">
  <link rel="stylesheet" href="chart.css">
  <link rel="stylesheet" href="modals.css">
</head>

<body>
  <p class="title"> MY MONEY </p>
  <p class="js-total-income"></p>
  <p class="js-total"></p>
  <p class="js-balance"></p>

  <button class="js-reset" onclick="resetExpenses()">Reset Expenses</button>
  <button class="js-reset chart-analysis-btn" onclick="generateChart()">Update Charts</button>
  <button class="js-reset" onclick="openAddModal()">New Expense</button>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <div class="non-calc">

        <div class="date-container">
          <div>
            <label for="js-expense-date" class="date-label">Date:</label>
          </div>
          
          <div>
            <input type="date" class="js-expense-date">
          </div>
          
        </div>

        <div class="expense-type">
          <button onclick="toggleExp()">INCOME</button>
          <button class="active" onclick="toggleExp()">EXPENSE</button>
        </div>

          <div class="accounts">
          <label for="accounts" class="drop-down-label">Account:</label>
          <select name="Account" id="accounts">
          </select>
          </div>

          <div class="categories">
          <label for="categories" class="drop-down-label">Category:</label>
          <select name="Category" id="categories">
          </select>
          </div>

        
        <diV class="label-container">
          <input type="text" class="js-expense-label" placeholder="Add label">
        </diV>
        <div class="add-exp">
          <button class="js-add-expense Add-btn" onclick="addExpense()">Add</button>
          <button class="js-add-expense Cancel-btn" onclick="cancelExpense()">Cancel</button>
        </div>
        
      </div>

      <div class="calc">
        <input class="js-expression" onkeydown="handleKeyDownCalc(event)">

        <div class="calc-buttons">
          <button onclick="
            updateCalculation('+');
            "> + </button>
          <button onclick="
            updateCalculation('1');
            "> 1 </button>
          <button onclick="
            updateCalculation('2');
            "> 2 </button>
          <button onclick="
            updateCalculation('3');
            "> 3 </button>

          <button onclick="
            updateCalculation('-');
            "> - </button>
          <button onclick="
            updateCalculation('4');
            "> 4 </button>
          <button onclick="
            updateCalculation('5');
            "> 5 </button>
          <button onclick="
            updateCalculation('6');
            "> 6 </button>

          <button onclick="
            updateCalculation('*');
            "> * </button>
          <button onclick="
            updateCalculation('7');
            "> 7 </button>
          <button onclick="
            updateCalculation('8');
            "> 8 </button>
          <button onclick="
            updateCalculation('9');
            "> 9 </button>

          <button onclick="
            updateCalculation('/');
            "> / </button>
          <button onclick="
            updateCalculation('0');
            "> 0 </button>
          <button onclick="
            updateCalculation('.');
            "> . </button>
          <button onclick="
            updateCalculation('=');
            "> = </button>
        </div>

        <div>
          <button class="clear" onclick="
          updateCalculation('C');
          "> Clear </button>
          <button class="clear" onclick="
            updateCalculation('del');
            "> Del </button>
        </div>
        
      </div>

    </div>
  </div>

  <label for="js-filter-type" class="drop-down-label">Filter by Type</label>
  <select id="js-filter-type">
    <option value="all">All</option>
    <option value="EXPENSE">Expense</option>
    <option value="INCOME">Income</option>
  </select>
  <label for="js-filter-category" class="drop-down-label">Filter by Category</label>
  <select id="js-filter-category">
    <option value="all">All</option>
  </select>
  <label for="js-filter-account" class="drop-down-label">Filter by Account</label>
  <select id="js-filter-account">
    <option value="all">All</option>
  </select>

  <div class="expense-list">
  </div>

  

  <div id="chart-container" class="chart-container">
    <div class="pie-charts">
      <div class="chart-box">
        <canvas id="expenseChart"></canvas>
      </div>
      <div class="chart-box">
        <canvas id="incomeChart"></canvas>
      </div>
    </div>

    <div class="bar-chart">
      <canvas id="expenseBar"></canvas>
    </div>

    
  </div>



  <script src="calc.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="chart.js"></script>
  <script src="filters.js"></script>
  <script src="expense.js"></script>
  <script src="modals.js"></script>
  
</body>

</html>
