<!DOCTYPE html>
<html>

<head>
  <title>
    Expense Tracker
  </title>
  <link rel="stylesheet" href="calc.css">
</head>

<body>
  <p class="title"> MY MONEY </p>

  <div class="expense-manager">
    <div class="calc">
      <input type="text" class="js-expense-label" placeholder="Expense Label" onkeydown="handleKeyDownLabel(event)">
      <button class="js-add-expense" onclick="addExpense()">Add</button>
      <input class="js-expression" onkeydown="handleKeyDownCalc(event)">
      <div class="calc-buttons">
        <button onclick="
          updateCalculation('+');
          "> + </button>
        <button onclick="
          updateCalculation('1');
          "> 1 </button>
        <button onclick="
          updateCalculation('2');
          "> 2 </button>
        <button onclick="
          updateCalculation('3');
          "> 3 </button>

        <button onclick="
          updateCalculation('-');
          "> - </button>
        <button onclick="
          updateCalculation('4');
          "> 4 </button>
        <button onclick="
          updateCalculation('5');
          "> 5 </button>
        <button onclick="
          updateCalculation('6');
          "> 6 </button>

        <button onclick="
          updateCalculation('*');
          "> * </button>
        <button onclick="
          updateCalculation('7');
          "> 7 </button>
        <button onclick="
          updateCalculation('8');
          "> 8 </button>
        <button onclick="
          updateCalculation('9');
          "> 9 </button>

        <button onclick="
          updateCalculation('/');
          "> / </button>
        <button onclick="
          updateCalculation('0');
          "> 0 </button>
        <button onclick="
          updateCalculation('.');
          "> . </button>
        <button onclick="
          updateCalculation('=');
          "> = </button>
      </div>
      <button class="clear" onclick="
        updateCalculation('C');
        "> Clear </button>
      <button class="clear" onclick="
        updateCalculation('del');
        "> Del </button>
    </div>

    <div class="expense-list">
      <p style="
        font-weight: bold;
      "> EXPENSE LIST</p>
    </div>

  </div>



  <script src="calc.js"></script>
</body>

</html>
