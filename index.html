<!DOCTYPE html>
<html>

<head>
  <title>
    Expense Tracker
  </title>
  <link rel="stylesheet" href="calc.css">
  <link rel="stylesheet" href="expense.css">
  <link rel="stylesheet" href="chart.css">
</head>

<body>
  <p class="title"> MY MONEY </p>

  <p class="js-total"></p>

  <button class="js-reset" onclick="resetExpenses()">Reset Expenses</button>

  <div class="expense-manager">
    <div class="calc">
      <input type="text" class="js-expense-label" placeholder="Expense Label" onkeydown="handleKeyDownLabel(event)">
      <button class="js-add-expense" onclick="addExpense()">Add</button>
     
      <div class="categories">
        <label for="categories">Category:</label>
        <select name="Category" id="categories">
        </select>
      </div>

      <input type="date" class="js-expense-date">
      <input class="js-expression" onkeydown="handleKeyDownCalc(event)">
      
      <div class="calc-buttons">
        <button onclick="
          updateCalculation('+');
          "> + </button>
        <button onclick="
          updateCalculation('1');
          "> 1 </button>
        <button onclick="
          updateCalculation('2');
          "> 2 </button>
        <button onclick="
          updateCalculation('3');
          "> 3 </button>

        <button onclick="
          updateCalculation('-');
          "> - </button>
        <button onclick="
          updateCalculation('4');
          "> 4 </button>
        <button onclick="
          updateCalculation('5');
          "> 5 </button>
        <button onclick="
          updateCalculation('6');
          "> 6 </button>

        <button onclick="
          updateCalculation('*');
          "> * </button>
        <button onclick="
          updateCalculation('7');
          "> 7 </button>
        <button onclick="
          updateCalculation('8');
          "> 8 </button>
        <button onclick="
          updateCalculation('9');
          "> 9 </button>

        <button onclick="
          updateCalculation('/');
          "> / </button>
        <button onclick="
          updateCalculation('0');
          "> 0 </button>
        <button onclick="
          updateCalculation('.');
          "> . </button>
        <button onclick="
          updateCalculation('=');
          "> = </button>
      </div>
      <button class="clear" onclick="
        updateCalculation('C');
        "> Clear </button>
      <button class="clear" onclick="
        updateCalculation('del');
        "> Del </button>
    </div>
    <div class="expense-list">
    </div>
  </div>

  <div class="chart-container">
    <canvas id="expenseChart"></canvas>
  </div>



  <script src="calc.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="chart.js"></script>
  <script src="expense.js"></script>
</body>

</html>
